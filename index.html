<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · AIVIMED</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">
  <img class="login-logo" src="assets/img/logo.png" alt="AIVIMED" onerror="this.style.display='none'" />
  <div class="login-card">
    <h1>AIVIMED</h1>
    <p class="subtitle">Salud Integral</p>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" style="width:100%;">Ingresar</button>
      <p class="error-message" id="error-message"></p>
    </form>
  </div>

  <script src="assets/vendor/supabase.min.js"></script>
  <script src="assets/js/supabaseClient.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'pages/dashboard.html';
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = '';
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      if (error) { errorEl.textContent = 'Credenciales inválidas. Intentá nuevamente.'; return; }
      window.location.href = 'pages/dashboard.html';
    });
  </script>
</body>
</html>
