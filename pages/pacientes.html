<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacientes · AIVIMED</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar"><h1>Pacientes</h1></header>
      <div class="content">

        <div class="card">
          <h2 id="form-title" style="margin-top:0;">Nuevo paciente</h2>
          <form id="paciente-form">
            <input type="hidden" id="paciente-id" />
            <div class="form-row">
              <div class="form-group"><label>Nombre *</label><input id="nombre" required /></div>
              <div class="form-group"><label>Apellido *</label><input id="apellido" required /></div>
              <div class="form-group"><label>RUT</label><input id="dni" /></div>
              <div class="form-group"><label>Fecha de nacimiento</label><input type="date" id="fecha_nacimiento" /></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Teléfono</label><input id="telefono" /></div>
              <div class="form-group"><label>Email</label><input type="email" id="email" /></div>
              <div class="form-group"><label>Contacto emergencia</label><input id="contacto_emergencia_nombre" /></div>
              <div class="form-group"><label>Tel. emergencia</label><input id="contacto_emergencia_telefono" /></div>
            </div>
            <div class="form-group"><label>Dirección</label><input id="direccion" /></div>
            <div class="form-group"><label>Antecedentes / Alergias / Medicación</label><textarea id="antecedentes" rows="2"></textarea></div>
            <div class="form-group"><label>Observaciones</label><textarea id="observaciones" rows="2"></textarea></div>
            <button type="submit" id="submit-btn">Guardar paciente</button>
            <button type="button" id="cancel-btn" class="btn-secondary" style="display:none;">Cancelar</button>
            <p class="error-message" id="form-error"></p>
          </form>
        </div>

        <div class="card" style="margin-top:1rem;">
          <div class="toolbar">
            <h2 style="margin:0;">Listado</h2>
            <input type="search" id="search-input" placeholder="Buscar por nombre, apellido o RUT…" style="max-width:300px;" />
          </div>
          <table>
            <thead>
              <tr><th>Apellido y Nombre</th><th>RUT</th><th>Teléfono</th><th>Email</th><th style="min-width:200px;">Acciones</th></tr>
            </thead>
            <tbody id="pacientes-body"><tr><td colspan="5">Cargando...</td></tr></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="../assets/vendor/supabase.min.js"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    const FIELDS = ['nombre','apellido','dni','fecha_nacimiento','telefono','email',
      'direccion','contacto_emergencia_nombre','contacto_emergencia_telefono','antecedentes','observaciones'];
    let cache = [];

    const clearForm = () => {
      document.getElementById('paciente-id').value = '';
      FIELDS.forEach(f => document.getElementById(f).value = '');
      document.getElementById('form-title').textContent = 'Nuevo paciente';
      document.getElementById('submit-btn').textContent = 'Guardar paciente';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('form-error').textContent = '';
    };

    const fillForm = (p) => {
      document.getElementById('paciente-id').value = p.id;
      FIELDS.forEach(f => document.getElementById(f).value = p[f] ?? '');
      document.getElementById('form-title').textContent = `Editar: ${p.nombre} ${p.apellido}`;
      document.getElementById('submit-btn').textContent = 'Actualizar';
      document.getElementById('cancel-btn').style.display = 'inline-block';
      document.getElementById('form-error').textContent = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const renderTable = (list) => {
      const tbody = document.getElementById('pacientes-body');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="6">Sin resultados.</td></tr>'; return; }
      tbody.innerHTML = list.map(p => `<tr>
        <td>${p.apellido}, ${p.nombre}</td>
        <td>${p.dni ?? '–'}</td>
        <td>${p.telefono ?? '–'}</td>
        <td>${p.email ?? '–'}</td>
        <td>
          <a href="historial.html?id=${p.id}" class="btn btn-sm" style="text-decoration:none;">Historial</a>
          <button class="btn-secondary btn-sm edit-btn" data-id="${p.id}">Editar</button>
          <button class="btn-danger btn-sm del-btn" data-id="${p.id}">Baja</button>
        </td>
      </tr>`).join('');

      tbody.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => fillForm(cache.find(x => x.id === b.dataset.id))));
      tbody.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('¿Dar de baja este paciente?')) return;
        await supabaseClient.from('pacientes').update({ activo: false }).eq('id', b.dataset.id);
        await load();
      }));
    };

    const load = async () => {
      const { data } = await supabaseClient.from('pacientes').select('*').eq('activo', true).order('apellido');
      cache = data || [];
      renderTable(cache);
    };

    document.getElementById('search-input').addEventListener('input', e => {
      const t = e.target.value.trim().toLowerCase();
      renderTable(t ? cache.filter(p => `${p.nombre} ${p.apellido}`.toLowerCase().includes(t) || (p.dni||'').includes(t)) : cache);
    });

    document.getElementById('cancel-btn').addEventListener('click', clearForm);

    document.getElementById('paciente-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('paciente-id').value;
      const payload = Object.fromEntries(FIELDS.map(f => [f, document.getElementById(f).value || null]));
      const { error } = id
        ? await supabaseClient.from('pacientes').update(payload).eq('id', id)
        : await supabaseClient.from('pacientes').insert(payload);
      if (error) { document.getElementById('form-error').textContent = error.message; return; }
      clearForm(); await load();
    });

    (async () => { const s = await initLayout('pacientes'); if (!s) return; await load(); })();
  </script>
</body>
</html>
