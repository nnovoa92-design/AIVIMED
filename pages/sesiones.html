<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fichas de sesión · AIVIMED</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar"><h1>Fichas de sesión</h1></header>
      <div class="content">

        <div class="card">
          <h2 id="form-title" style="margin-top:0;">Nueva sesión</h2>
          <form id="sesion-form">
            <input type="hidden" id="sesion-id" />
            <div class="form-row">
              <div class="form-group">
                <label>Paciente *</label>
                <select id="paciente_id" required><option value="">Seleccionar…</option></select>
              </div>
              <div class="form-group">
                <label>Servicio</label>
                <select id="servicio_id"><option value="">Seleccionar…</option></select>
              </div>
              <div class="form-group">
                <label>Profesional líder</label>
                <select id="personal_id"><option value="">Sin asignar</option></select>
              </div>
              <div class="form-group">
                <label>2ª Profesional (apoyo)</label>
                <select id="personal_apoyo_id"><option value="">Sin asignar</option></select>
              </div>
              <div class="form-group">
                <label>Fecha y hora *</label>
                <input type="datetime-local" id="fecha" required />
              </div>
            </div>
            <div class="form-group"><label>Detalle del procedimiento (zona, dosis, lote, técnica…)</label><textarea id="detalle" rows="3"></textarea></div>
            <div class="form-group"><label>Observaciones post-sesión</label><textarea id="observaciones" rows="2"></textarea></div>
            <button type="submit" id="submit-btn">Guardar sesión</button>
            <button type="button" id="cancel-btn" class="btn-secondary" style="display:none;">Cancelar</button>
            <p class="error-message" id="form-error"></p>
          </form>
        </div>

        <div class="card" style="margin-top:1rem;">
          <div class="toolbar">
            <h2 style="margin:0;">Historial de sesiones</h2>
            <select id="filter-paciente" style="max-width:260px;">
              <option value="">Todos los pacientes</option>
            </select>
          </div>
          <table>
            <thead>
              <tr><th>Fecha</th><th>Paciente</th><th>Servicio</th><th>Profesionales</th><th>Detalle</th><th>Acciones</th></tr>
            </thead>
            <tbody id="sesiones-body"><tr><td colspan="6">Cargando...</td></tr></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="../assets/vendor/supabase.min.js"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    let sesionesCache = [];

    const clearForm = () => {
      ['sesion-id','paciente_id','servicio_id','personal_id','personal_apoyo_id','detalle','observaciones'].forEach(f => {
        const el = document.getElementById(f); if (el) el.value = '';
      });
      const now = new Date(); now.setSeconds(0,0);
      document.getElementById('fecha').value = now.toISOString().slice(0,16);
      document.getElementById('form-title').textContent = 'Nueva sesión';
      document.getElementById('submit-btn').textContent = 'Guardar sesión';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('form-error').textContent = '';
    };

    const fillForm = (s) => {
      document.getElementById('sesion-id').value = s.id;
      document.getElementById('paciente_id').value = s.paciente_id ?? '';
      document.getElementById('servicio_id').value = s.servicio_id ?? '';
      document.getElementById('personal_id').value = s.personal_id ?? '';
      document.getElementById('personal_apoyo_id').value = s.personal_apoyo_id ?? '';
      document.getElementById('fecha').value = s.fecha ? s.fecha.slice(0,16) : '';
      document.getElementById('detalle').value = s.detalle ?? '';
      document.getElementById('observaciones').value = s.observaciones ?? '';
      document.getElementById('form-title').textContent = 'Editar sesión';
      document.getElementById('submit-btn').textContent = 'Actualizar';
      document.getElementById('cancel-btn').style.display = 'inline-block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const renderSesiones = (list) => {
      const tbody = document.getElementById('sesiones-body');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="6">Sin sesiones registradas.</td></tr>'; return; }
      tbody.innerHTML = list.map(s => `<tr>
        <td>${fmtFechaHora(s.fecha)}</td>
        <td>${s.pacientes ? `${s.pacientes.nombre} ${s.pacientes.apellido}` : '–'}</td>
        <td>${s.servicios?.nombre ?? '–'}</td>
        <td>${s.lider ? `${s.lider.nombre} ${s.lider.apellido}` : '–'}${s.apoyo ? `<br><span style="font-size:0.8em;color:var(--color-text-muted);">+ ${s.apoyo.nombre} ${s.apoyo.apellido} (apoyo)</span>` : ''}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${s.detalle ?? ''}">${s.detalle ?? '–'}</td>
        <td>
          <button class="btn-secondary btn-sm edit-btn" data-id="${s.id}">Editar</button>
          <button class="btn-danger btn-sm del-btn" data-id="${s.id}">Eliminar</button>
        </td>
      </tr>`).join('');
      tbody.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => fillForm(sesionesCache.find(x => x.id === b.dataset.id))));
      tbody.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('¿Eliminar esta sesión?')) return;
        await supabaseClient.from('sesiones').delete().eq('id', b.dataset.id);
        await load();
      }));
    };

    const load = async () => {
      const pacId = document.getElementById('filter-paciente').value;
      let q = supabaseClient
        .from('sesiones')
        .select('*, pacientes(nombre,apellido), servicios(nombre), lider:personal!personal_id(nombre,apellido), apoyo:personal!personal_apoyo_id(nombre,apellido)')
        .order('fecha', { ascending: false })
        .limit(100);
      if (pacId) q = q.eq('paciente_id', pacId);
      const { data } = await q;
      sesionesCache = data || [];
      renderSesiones(sesionesCache);
    };

    document.getElementById('filter-paciente').addEventListener('change', load);
    document.getElementById('cancel-btn').addEventListener('click', clearForm);

    document.getElementById('sesion-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('sesion-id').value;
      const payload = {
        paciente_id: document.getElementById('paciente_id').value || null,
        servicio_id: document.getElementById('servicio_id').value || null,
        personal_id: document.getElementById('personal_id').value || null,
        personal_apoyo_id: document.getElementById('personal_apoyo_id').value || null,
        fecha: document.getElementById('fecha').value || null,
        detalle: document.getElementById('detalle').value || null,
        observaciones: document.getElementById('observaciones').value || null,
      };
      const { error } = id
        ? await supabaseClient.from('sesiones').update(payload).eq('id', id)
        : await supabaseClient.from('sesiones').insert(payload);
      if (error) { document.getElementById('form-error').textContent = error.message; return; }
      clearForm(); await load();
    });

    (async () => {
      const s = await initLayout('sesiones');
      if (!s) return;

      const [{ data: pacientes }, { data: servicios }, { data: personal }] = await Promise.all([
        supabaseClient.from('pacientes').select('id,nombre,apellido').eq('activo',true).order('apellido'),
        supabaseClient.from('servicios').select('id,nombre').eq('activo',true).order('nombre'),
        supabaseClient.from('personal').select('id,nombre,apellido').eq('activo',true).order('apellido'),
      ]);

      const selPac = document.getElementById('paciente_id');
      const filterPac = document.getElementById('filter-paciente');
      (pacientes||[]).forEach(p => {
        const opt = new Option(`${p.apellido}, ${p.nombre}`, p.id);
        selPac.add(opt.cloneNode(true));
        filterPac.add(new Option(`${p.apellido}, ${p.nombre}`, p.id));
      });

      const selSrv = document.getElementById('servicio_id');
      (servicios||[]).forEach(sv => selSrv.add(new Option(sv.nombre, sv.id)));

      const selPer = document.getElementById('personal_id');
      const selApoyo = document.getElementById('personal_apoyo_id');
      (personal||[]).forEach(p => {
        selPer.add(new Option(`${p.nombre} ${p.apellido}`, p.id));
        selApoyo.add(new Option(`${p.nombre} ${p.apellido}`, p.id));
      });

      const now = new Date(); now.setSeconds(0,0);
      document.getElementById('fecha').value = now.toISOString().slice(0,16);

      await load();
    })();
  </script>
</body>
</html>
