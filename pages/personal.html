<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal · AIVIMED</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar"><h1>Personal</h1></header>
      <div class="content">

        <div class="card">
          <h2 id="form-title" style="margin-top:0;">Nuevo profesional</h2>
          <form id="personal-form">
            <input type="hidden" id="personal-id" />
            <div class="form-row">
              <div class="form-group"><label>Nombre *</label><input id="nombre" required /></div>
              <div class="form-group"><label>Apellido *</label><input id="apellido" required /></div>
              <div class="form-group"><label>Especialidad</label><input id="especialidad" placeholder="Ej: Enfermería, Estética…" /></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Teléfono</label><input id="telefono" /></div>
              <div class="form-group"><label>Email</label><input type="email" id="email" /></div>
            </div>
            <button type="submit" id="submit-btn">Guardar</button>
            <button type="button" id="cancel-btn" class="btn-secondary" style="display:none;">Cancelar</button>
            <p class="error-message" id="form-error"></p>
          </form>
        </div>

        <div class="card" style="margin-top:1rem;">
          <h2 style="margin:0 0 1rem;">Equipo</h2>
          <table>
            <thead>
              <tr><th>Nombre</th><th>Especialidad</th><th>Teléfono</th><th>Email</th><th>Acciones</th></tr>
            </thead>
            <tbody id="personal-body"><tr><td colspan="6">Cargando...</td></tr></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <script src="../assets/vendor/supabase.min.js"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    const FIELDS = ['nombre','apellido','especialidad','telefono','email'];
    let cache = [];

    const clearForm = () => {
      document.getElementById('personal-id').value = '';
      FIELDS.forEach(f => document.getElementById(f).value = '');
      document.getElementById('form-title').textContent = 'Nuevo profesional';
      document.getElementById('submit-btn').textContent = 'Guardar';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('form-error').textContent = '';
    };

    const fillForm = (p) => {
      document.getElementById('personal-id').value = p.id;
      FIELDS.forEach(f => document.getElementById(f).value = p[f] ?? '');
      document.getElementById('form-title').textContent = `Editar: ${p.nombre} ${p.apellido}`;
      document.getElementById('submit-btn').textContent = 'Actualizar';
      document.getElementById('cancel-btn').style.display = 'inline-block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const renderTable = (list) => {
      const tbody = document.getElementById('personal-body');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="6">Sin personal registrado.</td></tr>'; return; }
      tbody.innerHTML = list.map(p => `<tr>
        <td>${p.apellido}, ${p.nombre}</td>
        <td>${p.especialidad ?? '–'}</td>
        <td>${p.matricula ?? '–'}</td>
        <td>${p.telefono ?? '–'}</td>
        <td>${p.email ?? '–'}</td>
        <td>
          <button class="btn-secondary btn-sm edit-btn" data-id="${p.id}">Editar</button>
          <button class="btn-danger btn-sm del-btn" data-id="${p.id}">Dar de baja</button>
        </td>
      </tr>`).join('');
      tbody.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => fillForm(cache.find(x => x.id === b.dataset.id))));
      tbody.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('¿Dar de baja?')) return;
        await supabaseClient.from('personal').update({ activo: false }).eq('id', b.dataset.id);
        await load();
      }));
    };

    const load = async () => {
      const { data } = await supabaseClient.from('personal').select('*').eq('activo', true).order('apellido');
      cache = data || [];
      renderTable(cache);
    };

    document.getElementById('cancel-btn').addEventListener('click', clearForm);

    document.getElementById('personal-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('personal-id').value;
      const payload = Object.fromEntries(FIELDS.map(f => [f, document.getElementById(f).value || null]));
      const { error } = id
        ? await supabaseClient.from('personal').update(payload).eq('id', id)
        : await supabaseClient.from('personal').insert(payload);
      if (error) { document.getElementById('form-error').textContent = error.message; return; }
      clearForm(); await load();
    });

    (async () => { const s = await initLayout('personal'); if (!s) return; await load(); })();
  </script>
</body>
</html>
