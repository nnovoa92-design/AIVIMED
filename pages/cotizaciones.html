<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotizaciones · AIVIMED</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .items-table th, .items-table td { padding: 0.5rem; }
    .items-table input, .items-table select { font-size: 0.85rem; padding: 0.4rem 0.5rem; }
    .items-table td.col-qty input { width: 70px; }
    .items-table td.col-price input { width: 110px; }
    .items-table td.col-subtotal { text-align: right; font-weight: 600; white-space: nowrap; }
    .totales-box { display: flex; justify-content: flex-end; margin-top: 1rem; }
    .totales-box table { width: auto; min-width: 260px; }
    .totales-box td { padding: 0.4rem 1rem; }
    .totales-box tr:last-child td { font-weight: 700; font-size: 1.05rem; color: var(--color-primary-dark); border-top: 2px solid var(--color-border); }

    /* Impresión */
    .print-area { display: none; }
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 2rem; }
    }
    .pdf-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #c5a44e; }
    .pdf-header img { width: 64px; border-radius: 8px; }
    .pdf-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    .pdf-table th { background: #f0f5f3; }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar"><h1>Cotizaciones</h1></header>
      <div class="content">

        <!-- Formulario -->
        <div class="card" id="form-card">
          <h2 id="form-title" style="margin-top:0;">Nueva cotización</h2>
          <form id="cot-form">
            <input type="hidden" id="cot-id" />
            <div class="form-row">
              <div class="form-group">
                <label>Paciente *</label>
                <select id="paciente_id" required><option value="">Seleccionar…</option></select>
              </div>
              <div class="form-group">
                <label>Estado</label>
                <select id="estado">
                  <option value="borrador">Borrador</option>
                  <option value="enviada">Enviada</option>
                  <option value="aprobada">Aprobada</option>
                  <option value="rechazada">Rechazada</option>
                </select>
              </div>
            </div>

            <h3 style="margin:1.25rem 0 0.5rem;color:var(--color-primary-dark);">Ítems de la cotización</h3>
            <table class="items-table">
              <thead>
                <tr>
                  <th style="min-width:220px;">Servicio</th>
                  <th>Cant.</th>
                  <th>Precio unit.</th>
                  <th>Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="items-body"></tbody>
            </table>
            <button type="button" id="add-item-btn" class="btn-secondary btn-sm" style="margin-top:0.5rem;">+ Agregar ítem</button>

            <div class="totales-box">
              <table>
                <tr><td>Total</td><td id="total-display">$0</td></tr>
              </table>
            </div>

            <div class="form-group" style="margin-top:1rem;">
              <label>Notas</label>
              <textarea id="notas" rows="2"></textarea>
            </div>

            <button type="submit" id="submit-btn">Guardar cotización</button>
            <button type="button" id="cancel-btn" class="btn-secondary" style="display:none;">Cancelar</button>
            <p class="error-message" id="form-error"></p>
          </form>
        </div>

        <!-- Listado -->
        <div class="card" style="margin-top:1.25rem;">
          <div class="toolbar">
            <h2 style="margin:0;">Listado de cotizaciones</h2>
            <select id="filter-estado" style="max-width:200px;">
              <option value="">Todos los estados</option>
              <option value="borrador">Borrador</option>
              <option value="enviada">Enviada</option>
              <option value="aprobada">Aprobada</option>
              <option value="rechazada">Rechazada</option>
            </select>
          </div>
          <table>
            <thead>
              <tr><th>N°</th><th>Fecha</th><th>Paciente</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody id="cots-body"><tr><td colspan="6">Cargando...</td></tr></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- Área de impresión / PDF -->
  <div class="print-area" id="print-area"></div>

  <script src="../assets/vendor/supabase.min.js"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    let serviciosCache = [];
    let pacientesCache = [];
    let cotsCache = [];
    let items = []; // { servicio_id, descripcion, cantidad, precio_unitario }

    function fmt(n) { return fmtMoneda(n); }

    function calcTotal() {
      return items.reduce((s, it) => s + (Number(it.cantidad) || 0) * (Number(it.precio_unitario) || 0), 0);
    }

    function renderItems() {
      const tbody = document.getElementById('items-body');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:var(--color-text-muted);">Sin ítems. Agregá uno con el botón de abajo.</td></tr>';
      } else {
        tbody.innerHTML = items.map((it, idx) => {
          const opts = serviciosCache.map(s => `<option value="${s.id}" ${s.id === it.servicio_id ? 'selected' : ''}>${s.nombre}</option>`).join('');
          const subtotal = (Number(it.cantidad) || 0) * (Number(it.precio_unitario) || 0);
          return `<tr data-idx="${idx}">
            <td>
              <select class="item-servicio">
                <option value="">— Personalizado —</option>
                ${opts}
              </select>
              ${!it.servicio_id ? `<input class="item-desc" value="${it.descripcion || ''}" placeholder="Descripción del ítem" style="margin-top:0.3rem;" />` : ''}
            </td>
            <td class="col-qty"><input type="number" class="item-cant" min="0" step="1" value="${it.cantidad}" /></td>
            <td class="col-price"><input type="number" class="item-precio" min="0" step="0.01" value="${it.precio_unitario}" /></td>
            <td class="col-subtotal">${fmt(subtotal)}</td>
            <td><button type="button" class="btn-danger btn-sm del-item-btn">✕</button></td>
          </tr>`;
        }).join('');
      }

      document.getElementById('total-display').textContent = fmt(calcTotal());

      tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
        const idx = Number(tr.dataset.idx);

        tr.querySelector('.item-servicio').addEventListener('change', (e) => {
          const srv = serviciosCache.find(s => s.id === e.target.value);
          if (srv) {
            items[idx].servicio_id = srv.id;
            items[idx].descripcion = srv.nombre;
            items[idx].precio_unitario = srv.precio ?? 0;
          } else {
            items[idx].servicio_id = null;
            items[idx].descripcion = '';
          }
          renderItems();
        });

        const descInput = tr.querySelector('.item-desc');
        if (descInput) descInput.addEventListener('input', (e) => { items[idx].descripcion = e.target.value; });

        tr.querySelector('.item-cant').addEventListener('input', (e) => {
          items[idx].cantidad = e.target.value;
          tr.querySelector('.col-subtotal').textContent = fmt((Number(items[idx].cantidad)||0) * (Number(items[idx].precio_unitario)||0));
          document.getElementById('total-display').textContent = fmt(calcTotal());
        });

        tr.querySelector('.item-precio').addEventListener('input', (e) => {
          items[idx].precio_unitario = e.target.value;
          tr.querySelector('.col-subtotal').textContent = fmt((Number(items[idx].cantidad)||0) * (Number(items[idx].precio_unitario)||0));
          document.getElementById('total-display').textContent = fmt(calcTotal());
        });

        tr.querySelector('.del-item-btn').addEventListener('click', () => {
          items.splice(idx, 1);
          renderItems();
        });
      });
    }

    document.getElementById('add-item-btn').addEventListener('click', () => {
      items.push({ servicio_id: null, descripcion: '', cantidad: 1, precio_unitario: 0 });
      renderItems();
    });

    function clearForm() {
      document.getElementById('cot-id').value = '';
      document.getElementById('paciente_id').value = '';
      document.getElementById('estado').value = 'borrador';
      document.getElementById('notas').value = '';
      items = [];
      renderItems();
      document.getElementById('form-title').textContent = 'Nueva cotización';
      document.getElementById('submit-btn').textContent = 'Guardar cotización';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('form-error').textContent = '';
    }

    async function editCotizacion(id) {
      const cot = cotsCache.find(c => c.id === id);
      if (!cot) return;
      document.getElementById('cot-id').value = cot.id;
      document.getElementById('paciente_id').value = cot.paciente_id;
      document.getElementById('estado').value = cot.estado;
      document.getElementById('notas').value = cot.notas || '';

      const { data: its } = await supabaseClient.from('cotizacion_items').select('*').eq('cotizacion_id', id).order('orden');
      items = (its || []).map(it => ({ servicio_id: it.servicio_id, descripcion: it.descripcion, cantidad: it.cantidad, precio_unitario: it.precio_unitario }));
      renderItems();

      document.getElementById('form-title').textContent = `Editar cotización ${fmtNumero('COT', cot.numero)}`;
      document.getElementById('submit-btn').textContent = 'Actualizar cotización';
      document.getElementById('cancel-btn').style.display = 'inline-block';
      document.getElementById('form-error').textContent = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('cancel-btn').addEventListener('click', clearForm);

    document.getElementById('cot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      errorEl.textContent = '';

      const pacienteId = document.getElementById('paciente_id').value;
      if (!pacienteId) { errorEl.textContent = 'Seleccioná un paciente.'; return; }
      if (!items.length) { errorEl.textContent = 'Agregá al menos un ítem.'; return; }

      const id = document.getElementById('cot-id').value;
      const payloadCot = {
        paciente_id: pacienteId,
        estado: document.getElementById('estado').value,
        notas: document.getElementById('notas').value || null,
      };

      let cotId = id;
      if (id) {
        const { error } = await supabaseClient.from('cotizaciones').update(payloadCot).eq('id', id);
        if (error) { errorEl.textContent = error.message; return; }
        await supabaseClient.from('cotizacion_items').delete().eq('cotizacion_id', id);
      } else {
        const { data, error } = await supabaseClient.from('cotizaciones').insert(payloadCot).select('id').single();
        if (error) { errorEl.textContent = error.message; return; }
        cotId = data.id;
      }

      const itemsPayload = items.map((it, idx) => ({
        cotizacion_id: cotId,
        servicio_id: it.servicio_id || null,
        descripcion: it.descripcion || 'Ítem sin descripción',
        cantidad: it.cantidad || 1,
        precio_unitario: it.precio_unitario || 0,
        orden: idx,
      }));
      const { error: errItems } = await supabaseClient.from('cotizacion_items').insert(itemsPayload);
      if (errItems) { errorEl.textContent = errItems.message; return; }

      clearForm();
      await loadCotizaciones();
    });

    // ─── Listado ───
    function renderCots(list) {
      const tbody = document.getElementById('cots-body');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="6">Sin cotizaciones registradas.</td></tr>'; return; }
      tbody.innerHTML = list.map(c => `<tr>
        <td>${fmtNumero('COT', c.numero)}</td>
        <td>${fmtFecha(c.fecha)}</td>
        <td>${c.pacientes ? `${c.pacientes.nombre} ${c.pacientes.apellido}` : '–'}</td>
        <td style="font-weight:600;">${fmt(c.total)}</td>
        <td>${badgeEstado(c.estado, ESTADOS_COTIZACION)}</td>
        <td>
          <button class="btn-secondary btn-sm edit-btn" data-id="${c.id}">Editar</button>
          <button class="btn-secondary btn-sm pdf-btn" data-id="${c.id}">PDF</button>
          <button class="btn-danger btn-sm del-btn" data-id="${c.id}">Eliminar</button>
        </td>
      </tr>`).join('');

      tbody.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => editCotizacion(b.dataset.id)));
      tbody.querySelectorAll('.pdf-btn').forEach(b => b.addEventListener('click', () => generarPDF(b.dataset.id)));
      tbody.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('¿Eliminar esta cotización?')) return;
        await supabaseClient.from('cotizaciones').delete().eq('id', b.dataset.id);
        await loadCotizaciones();
      }));
    }

    async function loadCotizaciones() {
      const { data: cots } = await supabaseClient
        .from('cotizaciones')
        .select('*, pacientes(nombre,apellido)')
        .order('numero', { ascending: false });

      // calcular total de cada cotización
      const { data: allItems } = await supabaseClient.from('cotizacion_items').select('cotizacion_id, cantidad, precio_unitario');
      const totales = {};
      (allItems || []).forEach(it => {
        totales[it.cotizacion_id] = (totales[it.cotizacion_id] || 0) + Number(it.cantidad) * Number(it.precio_unitario);
      });

      cotsCache = (cots || []).map(c => ({ ...c, total: totales[c.id] || 0 }));

      const filtro = document.getElementById('filter-estado').value;
      renderCots(filtro ? cotsCache.filter(c => c.estado === filtro) : cotsCache);
    }

    document.getElementById('filter-estado').addEventListener('change', () => {
      const filtro = document.getElementById('filter-estado').value;
      renderCots(filtro ? cotsCache.filter(c => c.estado === filtro) : cotsCache);
    });

    // ─── PDF ───
    async function generarPDF(id) {
      const cot = cotsCache.find(c => c.id === id);
      if (!cot) return;
      const { data: its } = await supabaseClient.from('cotizacion_items').select('*').eq('cotizacion_id', id).order('orden');

      const filas = (its || []).map(it => `
        <tr>
          <td>${it.descripcion}</td>
          <td style="text-align:center;">${it.cantidad}</td>
          <td style="text-align:right;">${fmt(it.precio_unitario)}</td>
          <td style="text-align:right;">${fmt(it.cantidad * it.precio_unitario)}</td>
        </tr>`).join('');

      const total = (its || []).reduce((s, it) => s + it.cantidad * it.precio_unitario, 0);
      const pacienteNombre = cot.pacientes ? `${cot.pacientes.nombre} ${cot.pacientes.apellido}` : '–';

      document.getElementById('print-area').innerHTML = `
        <div class="pdf-header">
          <img src="../assets/img/logo.png" alt="AIVIMED" onerror="this.style.display='none'" />
          <div>
            <div style="font-size:1.3rem;font-weight:700;color:#2d7558;">AIVIMED</div>
            <div style="font-size:0.85rem;color:#7a8a86;">Salud Integral</div>
          </div>
        </div>
        <h2 style="color:#2d7558;">Cotización ${fmtNumero('COT', cot.numero)}</h2>
        <p><strong>Paciente:</strong> ${pacienteNombre}<br/>
        <strong>Fecha:</strong> ${fmtFecha(cot.fecha)}<br/>
        <strong>Estado:</strong> ${ESTADOS_COTIZACION[cot.estado]?.label || cot.estado}</p>
        <table class="pdf-table">
          <thead><tr><th>Servicio</th><th>Cant.</th><th>Precio unit.</th><th>Subtotal</th></tr></thead>
          <tbody>${filas}</tbody>
        </table>
        <p style="text-align:right;font-size:1.1rem;font-weight:700;margin-top:1rem;">Total: ${fmt(total)}</p>
        ${cot.notas ? `<p><strong>Notas:</strong> ${cot.notas}</p>` : ''}
      `;

      const el = document.getElementById('print-area');
      el.style.cssText = 'display:block; position:absolute; left:-9999px; top:0; width:800px; background:#fff; padding:24px;';
      html2pdf().set({
        margin: 10,
        filename: `${fmtNumero('COT', cot.numero)}_${pacienteNombre}.pdf`,
        image: { type: 'jpeg', quality: 0.96 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).from(el).save().then(() => {
        el.style.cssText = '';
      });
    }

    (async () => {
      const s = await initLayout('cotizaciones');
      if (!s) return;

      const [{ data: pacientes }, { data: servicios }] = await Promise.all([
        supabaseClient.from('pacientes').select('id,nombre,apellido').eq('activo', true).order('apellido'),
        supabaseClient.from('servicios').select('id,nombre,precio').eq('activo', true).order('nombre'),
      ]);

      pacientesCache = pacientes || [];
      serviciosCache = servicios || [];

      const selPac = document.getElementById('paciente_id');
      pacientesCache.forEach(p => selPac.add(new Option(`${p.apellido}, ${p.nombre}`, p.id)));

      renderItems();
      await loadCotizaciones();
    })();
  </script>
</body>
</html>
