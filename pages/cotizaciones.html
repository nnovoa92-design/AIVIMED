<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotizaciones · AIVIMED</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .items-table th, .items-table td { padding: 0.5rem; }
    .items-table input, .items-table select { font-size: 0.85rem; padding: 0.4rem 0.5rem; }
    .items-table td.col-qty input { width: 70px; }
    .items-table td.col-price input { width: 110px; }
    .items-table td.col-subtotal { text-align: right; font-weight: 600; white-space: nowrap; }
    .totales-box { display: flex; justify-content: flex-end; margin-top: 1rem; }
    .totales-box table { width: auto; min-width: 260px; }
    .totales-box td { padding: 0.4rem 1rem; }
    .totales-box tr:last-child td { font-weight: 700; font-size: 1.05rem; color: var(--color-primary-dark); border-top: 2px solid var(--color-border); }

    /* Impresión */
    .print-area { display: none; }
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 2rem; }
    }
    .pdf-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #c5a44e; }
    .pdf-header img { width: 64px; border-radius: 8px; }
    .pdf-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    .pdf-table th { background: #f0f5f3; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(26,35,32,0.5);
      z-index: 500;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 520px;
      padding: 1.5rem;
    }
    .modal h3 { margin-top: 0; color: var(--color-primary-dark); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <header class="topbar"><h1>Cotizaciones</h1></header>
      <div class="content">

        <!-- Formulario -->
        <div class="card" id="form-card">
          <h2 id="form-title" style="margin-top:0;">Nueva cotización</h2>
          <form id="cot-form">
            <input type="hidden" id="cot-id" />
            <div class="form-row">
              <div class="form-group">
                <label>Paciente *</label>
                <div style="display:flex;gap:0.5rem;align-items:stretch;">
                  <select id="paciente_id" required style="flex:1;"><option value="">Seleccionar…</option></select>
                  <button type="button" id="nuevo-paciente-btn" class="btn-secondary btn-sm" title="Crear paciente nuevo" style="white-space:nowrap;">+ Nuevo</button>
                </div>
              </div>
              <div class="form-group">
                <label>Estado</label>
                <div id="estado-display" style="padding:0.55rem 0;font-size:0.9rem;">
                  <span class="badge badge-yellow">Por enviar</span>
                </div>
              </div>
              <div class="form-group">
                <label>IVA (19%)</label>
                <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;text-transform:none;letter-spacing:0;cursor:pointer;margin-top:0.4rem;">
                  <input type="checkbox" id="con_iva" style="width:auto;" />
                  Aplicar IVA a esta cotización
                </label>
              </div>
            </div>

            <h3 style="margin:1.25rem 0 0.5rem;color:var(--color-primary-dark);">Ítems de la cotización</h3>
            <table class="items-table">
              <thead>
                <tr>
                  <th style="min-width:220px;">Servicio</th>
                  <th>Cant.</th>
                  <th>Precio unit.</th>
                  <th>Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="items-body"></tbody>
            </table>
            <button type="button" id="add-item-btn" class="btn-secondary btn-sm" style="margin-top:0.5rem;">+ Agregar ítem</button>

            <div class="totales-box">
              <table>
                <tr id="row-neto"><td>Neto</td><td id="neto-display">$0</td></tr>
                <tr id="row-iva"><td>IVA (19%)</td><td id="iva-display">$0</td></tr>
                <tr><td>Total</td><td id="total-display">$0</td></tr>
              </table>
            </div>

            <div class="form-group" style="margin-top:1rem;">
              <label>Notas</label>
              <textarea id="notas" rows="2"></textarea>
            </div>

            <button type="submit" id="submit-btn">Guardar cotización</button>
            <button type="button" id="cancel-btn" class="btn-secondary" style="display:none;">Cancelar</button>
            <p class="error-message" id="form-error"></p>
          </form>
        </div>

        <!-- Listado -->
        <div class="card" style="margin-top:1.25rem;">
          <div class="toolbar">
            <h2 style="margin:0;">Listado de cotizaciones</h2>
            <select id="filter-estado" style="max-width:200px;">
              <option value="">Todos los estados</option>
              <option value="borrador">Borrador</option>
              <option value="enviada">Enviada</option>
              <option value="aprobada">Aprobada</option>
              <option value="rechazada">Rechazada</option>
            </select>
          </div>
          <table>
            <thead>
              <tr><th>N°</th><th>Fecha</th><th>Paciente</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody id="cots-body"><tr><td colspan="6">Cargando...</td></tr></tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- Modal: nuevo paciente -->
  <div class="modal-overlay" id="paciente-modal">
    <div class="modal">
      <h3>Nuevo paciente</h3>
      <form id="modal-paciente-form">
        <div class="form-row">
          <div class="form-group"><label>Nombre *</label><input id="m-nombre" required /></div>
          <div class="form-group"><label>Apellido *</label><input id="m-apellido" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>RUT</label><input id="m-dni" placeholder="12.345.678-9" /></div>
          <div class="form-group"><label>Teléfono</label><input id="m-telefono" placeholder="+56 9 1234 5678" /></div>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="m-email" /></div>
        <div class="form-group"><label>Antecedentes / Alergias / Medicación</label><textarea id="m-antecedentes" rows="2"></textarea></div>
        <p class="error-message" id="modal-error"></p>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn-secondary">Cancelar</button>
          <button type="submit">Guardar y seleccionar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Área de impresión / PDF -->
  <div class="print-area" id="print-area"></div>

  <script src="../assets/vendor/supabase.min.js"></script>
  <script src="../assets/js/supabaseClient.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script>
    let serviciosCache = [];
    let pacientesCache = [];
    let cotsCache = [];
    let items = []; // { servicio_id, descripcion, cantidad, precio_unitario }
    let logoDataUrl = null; // logo precargado como data URI para el PDF

    // Datos de la empresa para el documento de cotización
    const EMPRESA = {
      razon: 'AIVIMED',
      rut: '78.217.799-0',
      correo: 'aivimed.salud@gmail.com',
      direccion: 'Aníbal Pinto 531, Of. 65, Concepción',
      // Texto PROVISORIO — pendiente de definir con la empresa
      politica: 'Esta cotización tiene una validez de 30 días corridos desde su fecha de emisión. ' +
        'Los valores indicados están expresados en pesos chilenos (CLP) e incluyen impuestos cuando corresponda. ' +
        'Los procedimientos se realizan previa evaluación profesional y firma de consentimiento informado cuando aplique. ' +
        'Para reservar hora se podrá solicitar un abono. Las reprogramaciones deben avisarse con al menos 24 horas de anticipación.',
    };

    // Precarga el logo como data URI (evita PDF en blanco por carga asíncrona / CORS)
    async function precargarLogo() {
      try {
        const resp = await fetch('../assets/img/logo.png');
        const blob = await resp.blob();
        logoDataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      } catch (e) {
        logoDataUrl = null; // si falla, el PDF se genera sin logo
      }
    }

    function fmt(n) { return fmtMoneda(n); }

    function calcNeto() {
      return items.reduce((s, it) => s + (Number(it.cantidad) || 0) * (Number(it.precio_unitario) || 0), 0);
    }

    // Actualiza neto / IVA / total según el checkbox con_iva
    function actualizarTotales() {
      const neto = calcNeto();
      const conIva = document.getElementById('con_iva').checked;
      const iva = conIva ? Math.round(neto * IVA_PCT / 100) : 0;
      const total = neto + iva;
      document.getElementById('row-iva').style.display = conIva ? '' : 'none';
      document.getElementById('row-neto').style.display = conIva ? '' : 'none';
      document.getElementById('neto-display').textContent = fmt(neto);
      document.getElementById('iva-display').textContent = fmt(iva);
      document.getElementById('total-display').textContent = fmt(total);
    }

    function renderItems() {
      const tbody = document.getElementById('items-body');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:var(--color-text-muted);">Sin ítems. Agregá uno con el botón de abajo.</td></tr>';
      } else {
        tbody.innerHTML = items.map((it, idx) => {
          const opts = serviciosCache.map(s => `<option value="${s.id}" ${s.id === it.servicio_id ? 'selected' : ''}>${s.nombre}</option>`).join('');
          const subtotal = (Number(it.cantidad) || 0) * (Number(it.precio_unitario) || 0);
          return `<tr data-idx="${idx}">
            <td>
              <select class="item-servicio">
                <option value="">— Personalizado —</option>
                ${opts}
              </select>
              ${!it.servicio_id ? `<input class="item-desc" value="${it.descripcion || ''}" placeholder="Descripción del ítem" style="margin-top:0.3rem;" />` : ''}
            </td>
            <td class="col-qty"><input type="number" class="item-cant" min="0" step="1" value="${it.cantidad}" /></td>
            <td class="col-price"><input type="number" class="item-precio" min="0" step="0.01" value="${it.precio_unitario}" /></td>
            <td class="col-subtotal">${fmt(subtotal)}</td>
            <td><button type="button" class="btn-danger btn-sm del-item-btn">✕</button></td>
          </tr>`;
        }).join('');
      }

      actualizarTotales();

      tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
        const idx = Number(tr.dataset.idx);

        tr.querySelector('.item-servicio').addEventListener('change', (e) => {
          const srv = serviciosCache.find(s => s.id === e.target.value);
          if (srv) {
            items[idx].servicio_id = srv.id;
            items[idx].descripcion = srv.nombre;
            items[idx].precio_unitario = srv.precio ?? 0;
          } else {
            items[idx].servicio_id = null;
            items[idx].descripcion = '';
          }
          renderItems();
        });

        const descInput = tr.querySelector('.item-desc');
        if (descInput) descInput.addEventListener('input', (e) => { items[idx].descripcion = e.target.value; });

        tr.querySelector('.item-cant').addEventListener('input', (e) => {
          items[idx].cantidad = e.target.value;
          tr.querySelector('.col-subtotal').textContent = fmt((Number(items[idx].cantidad)||0) * (Number(items[idx].precio_unitario)||0));
          actualizarTotales();
        });

        tr.querySelector('.item-precio').addEventListener('input', (e) => {
          items[idx].precio_unitario = e.target.value;
          tr.querySelector('.col-subtotal').textContent = fmt((Number(items[idx].cantidad)||0) * (Number(items[idx].precio_unitario)||0));
          actualizarTotales();
        });

        tr.querySelector('.del-item-btn').addEventListener('click', () => {
          items.splice(idx, 1);
          renderItems();
        });
      });
    }

    document.getElementById('add-item-btn').addEventListener('click', () => {
      items.push({ servicio_id: null, descripcion: '', cantidad: 1, precio_unitario: 0 });
      renderItems();
    });

    function clearForm() {
      document.getElementById('cot-id').value = '';
      document.getElementById('paciente_id').value = '';
      document.getElementById('estado-display').innerHTML = '<span class="badge badge-yellow">Por enviar</span>';
      document.getElementById('con_iva').checked = false;
      document.getElementById('notas').value = '';
      items = [];
      renderItems();
      document.getElementById('form-title').textContent = 'Nueva cotización';
      document.getElementById('submit-btn').textContent = 'Guardar cotización';
      document.getElementById('cancel-btn').style.display = 'none';
      document.getElementById('form-error').textContent = '';
    }

    async function editCotizacion(id) {
      const cot = cotsCache.find(c => c.id === id);
      if (!cot) return;
      document.getElementById('cot-id').value = cot.id;
      document.getElementById('paciente_id').value = cot.paciente_id;
      document.getElementById('estado-display').innerHTML = badgeEstado(cot.estado, ESTADOS_COTIZACION)
        + ' <span style="font-size:0.78rem;color:var(--color-text-muted);">(al guardar cambios vuelve a “Por enviar”)</span>';
      document.getElementById('con_iva').checked = !!cot.con_iva;
      document.getElementById('notas').value = cot.notas || '';

      const { data: its } = await supabaseClient.from('cotizacion_items').select('*').eq('cotizacion_id', id).order('orden');
      items = (its || []).map(it => ({ servicio_id: it.servicio_id, descripcion: it.descripcion, cantidad: it.cantidad, precio_unitario: it.precio_unitario }));
      renderItems();

      document.getElementById('form-title').textContent = `Editar cotización ${fmtNumero('COT', cot.numero)}`;
      document.getElementById('submit-btn').textContent = 'Actualizar cotización';
      document.getElementById('cancel-btn').style.display = 'inline-block';
      document.getElementById('form-error').textContent = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('cancel-btn').addEventListener('click', clearForm);
    document.getElementById('con_iva').addEventListener('change', actualizarTotales);

    document.getElementById('cot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      errorEl.textContent = '';

      const pacienteId = document.getElementById('paciente_id').value;
      if (!pacienteId) { errorEl.textContent = 'Seleccioná un paciente.'; return; }
      if (!items.length) { errorEl.textContent = 'Agregá al menos un ítem.'; return; }

      const id = document.getElementById('cot-id').value;
      const payloadCot = {
        paciente_id: pacienteId,
        estado: 'borrador', // nueva o editada => "Por enviar" (debe (re)enviarse)
        con_iva: document.getElementById('con_iva').checked,
        notas: document.getElementById('notas').value || null,
      };

      let cotId = id;
      if (id) {
        const { error } = await supabaseClient.from('cotizaciones').update(payloadCot).eq('id', id);
        if (error) { errorEl.textContent = error.message; return; }
        await supabaseClient.from('cotizacion_items').delete().eq('cotizacion_id', id);
      } else {
        const { data, error } = await supabaseClient.from('cotizaciones').insert(payloadCot).select('id').single();
        if (error) { errorEl.textContent = error.message; return; }
        cotId = data.id;
      }

      const itemsPayload = items.map((it, idx) => ({
        cotizacion_id: cotId,
        servicio_id: it.servicio_id || null,
        descripcion: it.descripcion || 'Ítem sin descripción',
        cantidad: it.cantidad || 1,
        precio_unitario: it.precio_unitario || 0,
        orden: idx,
      }));
      const { error: errItems } = await supabaseClient.from('cotizacion_items').insert(itemsPayload);
      if (errItems) { errorEl.textContent = errItems.message; return; }

      clearForm();
      await loadCotizaciones();
    });

    // ─── Listado ───
    function renderCots(list) {
      const tbody = document.getElementById('cots-body');
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="6">Sin cotizaciones registradas.</td></tr>'; return; }
      tbody.innerHTML = list.map(c => {
        const aprobada = c.estado === 'aprobada';
        const decidir = (c.estado === 'borrador' || c.estado === 'enviada');
        return `<tr>
        <td>${fmtNumero('COT', c.numero)}</td>
        <td>${fmtFecha(c.fecha)}</td>
        <td>${c.pacientes ? `${c.pacientes.nombre} ${c.pacientes.apellido}` : '–'}</td>
        <td style="font-weight:600;">${fmt(c.total)}${c.con_iva ? ' <span style="font-size:0.7em;color:var(--color-text-muted);">c/IVA</span>' : ''}</td>
        <td>${badgeEstado(c.estado, ESTADOS_COTIZACION)}</td>
        <td style="white-space:nowrap;">
          ${decidir ? `<button class="btn-sm aceptar-btn" data-id="${c.id}" style="background:var(--color-success);border-color:var(--color-success);">Aceptar</button>
          <button class="btn-danger btn-sm rechazar-btn" data-id="${c.id}">Rechazar</button>` : ''}
          ${aprobada ? `<button class="btn-sm agendar-btn" data-id="${c.id}" data-pac="${c.paciente_id}">Agendar</button>` : ''}
          <button class="btn-sm wa-btn" data-id="${c.id}" style="background:#25d366;border-color:#25d366;">WhatsApp</button>
          <button class="btn-sm mail-btn" data-id="${c.id}" style="background:#1a73e8;border-color:#1a73e8;">Correo</button>
          <button class="btn-secondary btn-sm edit-btn" data-id="${c.id}">Editar</button>
          <button class="btn-secondary btn-sm pdf-btn" data-id="${c.id}">PDF</button>
          <button class="btn-danger btn-sm del-btn" data-id="${c.id}">Eliminar</button>
        </td>
      </tr>`;
      }).join('');

      tbody.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => editCotizacion(b.dataset.id)));
      tbody.querySelectorAll('.pdf-btn').forEach(b => b.addEventListener('click', () => generarPDF(b.dataset.id)));
      tbody.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('¿Eliminar esta cotización?')) return;
        await supabaseClient.from('cotizaciones').delete().eq('id', b.dataset.id);
        await loadCotizaciones();
      }));
      tbody.querySelectorAll('.rechazar-btn').forEach(b => b.addEventListener('click', async () => {
        await supabaseClient.from('cotizaciones').update({ estado: 'rechazada' }).eq('id', b.dataset.id);
        await loadCotizaciones();
      }));
      tbody.querySelectorAll('.aceptar-btn').forEach(b => b.addEventListener('click', async () => {
        await supabaseClient.from('cotizaciones').update({ estado: 'aprobada' }).eq('id', b.dataset.id);
        await loadCotizaciones();
        if (confirm('Cotización aceptada. ¿Querés agendar una hora para este paciente ahora?')) {
          const c = cotsCache.find(x => x.id === b.dataset.id);
          window.location.href = 'agenda.html?paciente=' + (c?.paciente_id || '');
        }
      }));
      tbody.querySelectorAll('.agendar-btn').forEach(b => b.addEventListener('click', () => {
        window.location.href = 'agenda.html?paciente=' + b.dataset.pac;
      }));
      tbody.querySelectorAll('.wa-btn').forEach(b => b.addEventListener('click', () => compartirWhatsApp(b.dataset.id)));
      tbody.querySelectorAll('.mail-btn').forEach(b => b.addEventListener('click', () => compartirCorreo(b.dataset.id)));
    }

    // Enlace público de respuesta de la cotización (mismo dominio que la app)
    function linkRespuesta(id) {
      return `${location.origin}/respuesta.html?cot=${id}`;
    }

    function mensajeCotizacion(c) {
      const nombre = c.pacientes ? c.pacientes.nombre : '';
      return `Hola ${nombre}! 👋\n\nTe compartimos tu cotización ${fmtNumero('COT', c.numero)} de AIVIMED por un total de ${fmt(c.total)}.\n\n`
        + `Podés revisarla y responder (Aceptar, Rechazar o dejar una Observación) en este enlace:\n${linkRespuesta(c.id)}\n\n`
        + `¡Gracias por confiar en AIVIMED — Salud Integral! 🦋`;
    }

    // Marca la cotización como "Enviada" si estaba "Por enviar"
    async function marcarEnviada(c) {
      if (c.estado === 'borrador') {
        await supabaseClient.from('cotizaciones').update({ estado: 'enviada' }).eq('id', c.id);
        await loadCotizaciones();
      }
    }

    function compartirWhatsApp(id) {
      const c = cotsCache.find(x => x.id === id);
      if (!c) return;
      let tel = (c.pacientes?.telefono || '').replace(/\D/g, '');
      if (tel && tel.length === 9 && tel.startsWith('9')) tel = '56' + tel; // CL: 9 dígitos -> +56
      const base = tel ? `https://wa.me/${tel}` : `https://wa.me/`;
      const url = `${base}?text=${encodeURIComponent(mensajeCotizacion(c))}`;
      let w = null; try { w = window.open(url, '_blank'); } catch(e) {}
      if (!w) window.location.href = url;
      marcarEnviada(c);
    }

    function compartirCorreo(id) {
      const c = cotsCache.find(x => x.id === id);
      if (!c) return;
      const para = c.pacientes?.email || '';
      const asunto = `Cotización ${fmtNumero('COT', c.numero)} — AIVIMED Salud Integral`;
      const p = new URLSearchParams({ view: 'cm', fs: '1', to: para, su: asunto, body: mensajeCotizacion(c) });
      const url = 'https://mail.google.com/mail/?' + p.toString();
      let w = null; try { w = window.open(url, '_blank'); } catch(e) {}
      if (!w) window.location.href = url;
      marcarEnviada(c);
    }

    async function loadCotizaciones() {
      const { data: cots } = await supabaseClient
        .from('cotizaciones')
        .select('*, pacientes(nombre,apellido,telefono,email)')
        .order('numero', { ascending: false });

      // calcular total de cada cotización
      const { data: allItems } = await supabaseClient.from('cotizacion_items').select('cotizacion_id, cantidad, precio_unitario');
      const totales = {};
      (allItems || []).forEach(it => {
        totales[it.cotizacion_id] = (totales[it.cotizacion_id] || 0) + Number(it.cantidad) * Number(it.precio_unitario);
      });

      cotsCache = (cots || []).map(c => {
        const neto = totales[c.id] || 0;
        const total = c.con_iva ? Math.round(neto * (1 + IVA_PCT / 100)) : neto;
        return { ...c, neto, total };
      });

      const filtro = document.getElementById('filter-estado').value;
      renderCots(filtro ? cotsCache.filter(c => c.estado === filtro) : cotsCache);
    }

    document.getElementById('filter-estado').addEventListener('change', () => {
      const filtro = document.getElementById('filter-estado').value;
      renderCots(filtro ? cotsCache.filter(c => c.estado === filtro) : cotsCache);
    });

    // ─── PDF (vía ventana de impresión: confiable, texto seleccionable, sin html2canvas) ───
    async function generarPDF(id) {
      const cot = cotsCache.find(c => c.id === id);
      if (!cot) return;

      // Abrir la ventana YA (dentro del gesto del usuario) para evitar bloqueo de popups
      const win = window.open('', '_blank');
      if (!win) { alert('El navegador bloqueó la ventana de impresión. Permití las ventanas emergentes para este sitio.'); return; }
      win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Generando…</title></head><body style="font-family:sans-serif;padding:2rem;color:#2d7558;">Generando cotización…</body></html>');

      // Traer ítems y datos completos del paciente en paralelo
      const [{ data: its }, { data: pac }] = await Promise.all([
        supabaseClient.from('cotizacion_items').select('*').eq('cotizacion_id', id).order('orden'),
        supabaseClient.from('pacientes')
          .select('nombre,apellido,dni,fecha_nacimiento,telefono,email,direccion')
          .eq('id', cot.paciente_id).single(),
      ]);

      const filas = (its || []).map(it => `
        <tr>
          <td>${it.descripcion}</td>
          <td style="text-align:center;">${it.cantidad}</td>
          <td style="text-align:right;">${fmt(it.precio_unitario)}</td>
          <td style="text-align:right;">${fmt(it.cantidad * it.precio_unitario)}</td>
        </tr>`).join('');

      const neto = (its || []).reduce((s, it) => s + it.cantidad * it.precio_unitario, 0);
      const iva = cot.con_iva ? Math.round(neto * IVA_PCT / 100) : 0;
      const total = neto + iva;
      const pacienteNombre = pac ? `${pac.nombre} ${pac.apellido}` : (cot.pacientes ? `${cot.pacientes.nombre} ${cot.pacientes.apellido}` : '–');
      const logoTag = logoDataUrl
        ? `<img src="${logoDataUrl}" alt="AIVIMED" style="width:78px;height:auto;border-radius:8px;" />`
        : '';

      // Fila opcional de dato de paciente (solo si tiene valor)
      const dp = (label, val) => val ? `<div><span class="lbl">${label}:</span> ${val}</div>` : '';
      const datosPaciente = [
        dp('Nombre', pacienteNombre),
        dp('RUT', pac?.dni),
        dp('Teléfono', pac?.telefono),
        dp('Correo', pac?.email),
        dp('Dirección', pac?.direccion),
        dp('Fecha de nac.', pac?.fecha_nacimiento ? fmtFecha(pac.fecha_nacimiento) : null),
      ].join('');

      const doc = `<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<title>Cotización ${fmtNumero('COT', cot.numero)} - ${pacienteNombre}</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; color: #1a2320; margin: 0; padding: 32px; font-size: 14px; }
  .head { display: flex; align-items: center; gap: 16px; border-bottom: 3px solid #c5a44e; padding-bottom: 16px; margin-bottom: 8px; }
  .head .brand { font-size: 24px; font-weight: 700; color: #2d7558; letter-spacing: 1px; }
  .head .empresa { font-size: 12px; color: #555; line-height: 1.5; margin-top: 4px; }
  .doc-title { display: flex; justify-content: space-between; align-items: baseline; margin: 18px 0 16px; }
  .doc-title h1 { font-size: 20px; color: #2d7558; margin: 0; }
  .doc-title .fecha { font-size: 13px; color: #555; }
  .panel { background: #f4f8f6; border: 1px solid #dce8e3; border-radius: 8px; padding: 12px 16px; margin-bottom: 18px; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #2d7558; margin: 0 0 8px; }
  .panel .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; font-size: 13px; }
  .panel .lbl { color: #7a8a86; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { border: 1px solid #ccc; padding: 8px 10px; text-align: left; }
  th { background: #e8f5ef; color: #2d7558; }
  .total { text-align: right; font-size: 18px; font-weight: 700; color: #2d7558; margin-top: 14px; }
  .notas { margin-top: 16px; font-size: 13px; color: #555; }
  .politica { margin-top: 24px; padding-top: 14px; border-top: 1px solid #eee; font-size: 11px; color: #777; line-height: 1.55; }
  .politica h3 { font-size: 12px; color: #2d7558; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 6px; }
  .pie { margin-top: 28px; font-size: 11px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 10px; }
  @media print { body { padding: 0; } .panel { background: #f4f8f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; } th { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style></head>
<body>
  <div class="head">
    ${logoTag}
    <div>
      <div class="brand">AIVIMED</div>
      <div class="empresa">
        ${EMPRESA.razon} · RUT ${EMPRESA.rut}<br>
        ${EMPRESA.direccion}<br>
        ${EMPRESA.correo}
      </div>
    </div>
  </div>

  <div class="doc-title">
    <h1>Cotización ${fmtNumero('COT', cot.numero)}</h1>
    <div class="fecha"><strong>Fecha:</strong> ${fmtFecha(cot.fecha)} &nbsp;·&nbsp; <strong>Estado:</strong> ${ESTADOS_COTIZACION[cot.estado]?.label || cot.estado}</div>
  </div>

  <div class="panel">
    <h2>Datos del paciente</h2>
    <div class="grid">${datosPaciente}</div>
  </div>

  <table>
    <thead><tr><th>Servicio</th><th style="text-align:center;">Cant.</th><th style="text-align:right;">Precio unit.</th><th style="text-align:right;">Subtotal</th></tr></thead>
    <tbody>${filas || '<tr><td colspan="4">Sin ítems</td></tr>'}</tbody>
  </table>
  ${cot.con_iva ? `<div style="text-align:right;font-size:14px;margin-top:12px;">Neto: ${fmt(neto)}<br>IVA (19%): ${fmt(iva)}</div>` : ''}
  <div class="total">Total: ${fmt(total)}</div>
  ${cot.notas ? `<div class="notas"><strong>Notas:</strong> ${cot.notas}</div>` : ''}

  <div class="politica">
    <h3>Política de la empresa</h3>
    ${EMPRESA.politica}
  </div>

  <div class="pie">${EMPRESA.razon} — ${EMPRESA.correo} · Documento generado el ${fmtFecha(new Date().toISOString())}</div>
  <script>
    window.onload = function() { setTimeout(function(){ window.print(); }, 300); };
  <\/script>
</body></html>`;

      win.document.open();
      win.document.write(doc);
      win.document.close();
    }

    // ─── Modal nuevo paciente ───
    const modal = document.getElementById('paciente-modal');

    function abrirModalPaciente() {
      ['m-nombre','m-apellido','m-dni','m-telefono','m-email','m-antecedentes'].forEach(f => document.getElementById(f).value = '');
      document.getElementById('modal-error').textContent = '';
      modal.classList.add('open');
      document.getElementById('m-nombre').focus();
    }
    function cerrarModalPaciente() { modal.classList.remove('open'); }

    document.getElementById('nuevo-paciente-btn').addEventListener('click', abrirModalPaciente);
    document.getElementById('modal-cancel').addEventListener('click', cerrarModalPaciente);
    modal.addEventListener('click', (e) => { if (e.target === modal) cerrarModalPaciente(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('open')) cerrarModalPaciente(); });

    document.getElementById('modal-paciente-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('modal-error');
      errEl.textContent = '';
      const payload = {
        nombre: document.getElementById('m-nombre').value.trim(),
        apellido: document.getElementById('m-apellido').value.trim(),
        dni: document.getElementById('m-dni').value.trim() || null,
        telefono: document.getElementById('m-telefono').value.trim() || null,
        email: document.getElementById('m-email').value.trim() || null,
        antecedentes: document.getElementById('m-antecedentes').value.trim() || null,
      };
      if (!payload.nombre || !payload.apellido) { errEl.textContent = 'Nombre y apellido son obligatorios.'; return; }

      const { data, error } = await supabaseClient.from('pacientes').insert(payload).select('id,nombre,apellido').single();
      if (error) { errEl.textContent = error.message; return; }

      // Agregar al cache y al selector, y seleccionarlo
      pacientesCache.push(data);
      pacientesCache.sort((a, b) => a.apellido.localeCompare(b.apellido));
      const selPac = document.getElementById('paciente_id');
      const opt = new Option(`${data.apellido}, ${data.nombre}`, data.id, true, true);
      selPac.add(opt);
      selPac.value = data.id;

      cerrarModalPaciente();
    });

    (async () => {
      const s = await initLayout('cotizaciones');
      if (!s) return;

      const [{ data: pacientes }, { data: servicios }] = await Promise.all([
        supabaseClient.from('pacientes').select('id,nombre,apellido').eq('activo', true).order('apellido'),
        supabaseClient.from('servicios').select('id,nombre,precio').eq('activo', true).order('nombre'),
      ]);

      pacientesCache = pacientes || [];
      serviciosCache = servicios || [];

      precargarLogo(); // en segundo plano, listo para cuando se genere un PDF

      const selPac = document.getElementById('paciente_id');
      pacientesCache.forEach(p => selPac.add(new Option(`${p.apellido}, ${p.nombre}`, p.id)));

      renderItems();
      await loadCotizaciones();
    })();
  </script>
</body>
</html>
